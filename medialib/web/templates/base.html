<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}musiclib{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
          },
          colors: {
            ink: { 950: '#0b0f17', 900: '#111827', 800: '#1f2937', 700: '#374151' },
          },
        },
      },
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-feature-settings: "cv11", "ss01"; }
    .scroll-thin::-webkit-scrollbar { width: 6px; height: 6px; }
    .scroll-thin::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 9999px; }
    details > summary { list-style: none; cursor: pointer; }
    details > summary::-webkit-details-marker { display: none; }
    details[open] > summary .chev { transform: rotate(90deg); }
    .chev { transition: transform .15s ease; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen antialiased">
  <nav class="bg-ink-950 text-white sticky top-0 z-20 backdrop-blur supports-[backdrop-filter]:bg-ink-950/80">
    <div class="max-w-6xl mx-auto px-6 h-14 flex items-center gap-8">
      <a href="/" class="font-semibold tracking-tight text-[15px] flex items-center gap-2">
        <span class="inline-block w-2 h-2 rounded-full bg-emerald-400"></span>musiclib
      </a>
      <div class="flex gap-5 text-sm text-slate-300">
        <a href="/library" class="hover:text-white transition-colors">Music</a>
        <a href="/books" class="hover:text-white transition-colors">Books</a>
        <a href="/migrate" class="hover:text-white transition-colors">Migrate</a>
      </div>
      <div class="ml-auto flex gap-2 text-[11px] font-medium">
        {% set st = status if status is defined else {} %}
        <span class="px-2 py-1 rounded-full {{ 'bg-emerald-500/20 text-emerald-300' if st.spotify else 'bg-white/5 text-slate-500' }}">Spotify</span>
        <span class="px-2 py-1 rounded-full {{ 'bg-red-500/20 text-red-300' if st.ytmusic else 'bg-white/5 text-slate-500' }}">YT</span>
        <span class="px-2 py-1 rounded-full {{ 'bg-amber-500/20 text-amber-300' if st.bandcamp else 'bg-white/5 text-slate-500' }}">Bandcamp</span>
      </div>
    </div>
  </nav>
  <main class="max-w-6xl mx-auto px-6 py-8">
    {% block content %}{% endblock %}
  </main>
  <footer class="max-w-6xl mx-auto px-6 py-10 text-center text-xs text-slate-400">
    musiclib &middot; self-hosted
  </footer>
</body>
</html>
